services:

  # ── Base de datos (solo accesible en red interna) ────────────────────────────
  postgres:
    image: docker.io/library/postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Aplicación Next.js (réplicas — escalar con --scale app=N) ───────────────
  app:
    build:
      context: .
      dockerfile: Containerfile
    restart: always
    environment:
      NODE_ENV:    production
      PORT:        3000
      HOSTNAME:    0.0.0.0
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME:     ${DB_NAME}
      JWT_SECRET:  ${JWT_SECRET}
      SYNC_SECRET: ${SYNC_SECRET}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY:            ${VAPID_PRIVATE_KEY}
      MAIL_GRAPH_ENABLED:           ${MAIL_GRAPH_ENABLED}
      MAIL_GRAPH_CLIENT_ID:         ${MAIL_GRAPH_CLIENT_ID}
      MAIL_GRAPH_CLIENT_SECRET:     ${MAIL_GRAPH_CLIENT_SECRET}
      MAIL_GRAPH_TENANT_ID:         ${MAIL_GRAPH_TENANT_ID}
      MAIL_GRAPH_USER_EMAIL:        ${MAIL_GRAPH_USER_EMAIL}
      MAIL_GRAPH_BCC:               ${MAIL_GRAPH_BCC}
    volumes:
      - ./public/uploads:/app/public/uploads
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Nginx: balanceador de carga interno ─────────────────────────────────────
  nginx-lb:
    image: docker.io/library/nginx:alpine
    restart: always
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend
    depends_on:
      app:
        condition: service_healthy

  # ── Scheduler de notificaciones ─────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Containerfile.scheduler
    restart: always
    environment:
      APP_BASE_URL:     http://nginx-lb
      SCHEDULER_SECRET: ${SCHEDULER_SECRET}
    networks:
      - frontend
    depends_on:
      nginx-lb:
        condition: service_started

volumes:
  pg_data:
    driver: local

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
