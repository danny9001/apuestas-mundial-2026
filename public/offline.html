<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin Conexión - Mundial 2026</title>
  <style>
    body {
      background-color: #09090b;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    .icon {
      font-size: 64px;
      color: #eab308;
      margin-bottom: 16px;
      animation: pulse 2s infinite;
    }
    h1 {
      font-size: 24px;
      margin: 0 0 10px 0;
      font-weight: 700;
    }
    p {
      color: #a1a1aa;
      font-size: 16px;
      margin: 0 0 24px 0;
      max-width: 320px;
      line-height: 1.5;
    }
    .btn {
      background-color: #eab308;
      color: #09090b;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #ca8a04;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="icon">🏆</div>
  <h1>Sin conexión a Internet</h1>
  <p>Para ver los marcadores en tiempo real y hacer tus apuestas, necesitas estar conectado a Internet.</p>
  <button class="btn" onclick="window.location.reload()">Reintentar Conexión</button>
</body>
</html>
