version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: apuestas_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mundial2026}
      POSTGRES_DB: ${DB_NAME:-apuestas_mundial}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - apuestas_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-apuestas_mundial}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apuestas_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-mundial2026}@apuestas_db:5432/${DB_NAME:-apuestas_mundial}
      JWT_SECRET: ${JWT_SECRET:-mundial2026_secret_key_12345}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/public/uploads
    networks:
      - apuestas_net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3

  supabase-studio:
    image: dpage/pgadmin4:8
    container_name: apuestas_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@mundial.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - apuestas_net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/misc/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  sync-worker:
    image: curlimages/curl:latest
    container_name: apuestas_sync
    restart: always
    depends_on:
      app:
        condition: service_healthy
    entrypoint: /bin/sh
    command: >
      -c "while true; do
        curl -s \"http://apuestas_app:3000/api/sync?key=$${SYNC_SECRET:-sync2026}\";
        sleep $${SYNC_INTERVAL:-60};
      done"
    environment:
      SYNC_SECRET: ${SYNC_SECRET:-sync2026}
      SYNC_INTERVAL: 60
    networks:
      - apuestas_net

volumes:
  db_data:
    driver: local
  uploads_data:
    driver: local
  node_modules_data:
    driver: local

networks:
  apuestas_net:
    driver: bridge
